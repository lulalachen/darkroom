name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  swift:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Bundle App
        run: ./build-app.sh
