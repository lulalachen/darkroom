name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  swift:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build App (Release, native Xcode)
        run: xcodebuild -project Darkroom.xcodeproj -scheme Darkroom -configuration Release -destination 'platform=macOS' -derivedDataPath dist/xcode build
